# This workflow publishes the Python package to PyPI when a release is created
# Uses PyPI Trusted Publishing - no API token needed
#
# SETUP REQUIRED (one-time):
# 1. Go to https://pypi.org/manage/account/publishing/
# 2. Add a new "pending publisher" with:
#    - PyPI Project Name: py_did_multiplegt_dyn
#    - Owner: anzonyquispe
#    - Repository name: py_did_multiplegt_dyn
#    - Workflow name: publish.yml
#    - Environment name: pypi

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Clean old builds
        run: |
          rm -rf dist/ build/ src/*.egg-info *.egg-info
          find . -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name '*.egg-info' -exec rm -rf {} + 2>/dev/null || true

      - name: Build package
        run: python -m build

      - name: Verify build artifacts
        run: |
          echo "Built packages:"
          ls -la dist/
          echo ""
          echo "Package count: $(ls dist/ | wc -l)"
          # Ensure only 2 files (wheel + sdist) are present
          if [ $(ls dist/ | wc -l) -ne 2 ]; then
            echo "ERROR: Expected exactly 2 files in dist/"
            exit 1
          fi

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # IMPORTANT: this permission is mandatory for trusted publishing
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/py_did_multiplegt_dyn

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Verify downloaded artifacts
        run: |
          echo "Downloaded packages:"
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
